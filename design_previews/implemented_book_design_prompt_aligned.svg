<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1400" viewBox="0 0 1800 1400">
  <defs>
    <filter id="panelShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#0f172a" flood-opacity=".13"/>
    </filter>
    <filter id="bookShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="16" flood-color="#020617" flood-opacity=".35"/>
    </filter>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eef2f7"/>
    </linearGradient>
    <linearGradient id="midnightLeather" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#222633"/>
      <stop offset=".48" stop-color="#10131B"/>
      <stop offset="1" stop-color="#05070C"/>
    </linearGradient>
    <linearGradient id="moneyLeather" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1F5B4C"/>
      <stop offset=".50" stop-color="#0E332C"/>
      <stop offset="1" stop-color="#061C18"/>
    </linearGradient>
    <linearGradient id="relationLeather" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#9C5D32"/>
      <stop offset=".48" stop-color="#673719"/>
      <stop offset="1" stop-color="#30170C"/>
    </linearGradient>
    <linearGradient id="selfLeather" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#171A2A"/>
      <stop offset=".50" stop-color="#101225"/>
      <stop offset="1" stop-color="#070813"/>
    </linearGradient>
    <linearGradient id="warmPage" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFAF1"/>
      <stop offset=".65" stop-color="#FFFDF8"/>
      <stop offset="1" stop-color="#F4EBD9"/>
    </linearGradient>
    <pattern id="leatherGrain" width="40" height="40" patternUnits="userSpaceOnUse">
      <rect width="40" height="40" fill="transparent"/>
      <path d="M-8 13 C6 6 18 20 30 12 S48 8 54 18" fill="none" stroke="#ffffff" stroke-opacity=".035"/>
      <path d="M-5 32 C10 22 22 39 45 28" fill="none" stroke="#000000" stroke-opacity=".19"/>
      <circle cx="11" cy="24" r="1.1" fill="#ffffff" opacity=".035"/>
      <circle cx="32" cy="10" r="1" fill="#000000" opacity=".18"/>
    </pattern>
    <pattern id="pageRules" width="30" height="30" patternUnits="userSpaceOnUse">
      <rect width="30" height="30" fill="transparent"/>
      <line x1="0" y1="29" x2="30" y2="29" stroke="#d8c7ad" stroke-opacity=".18"/>
    </pattern>
    <style>
      .title { font-family: "Noto Sans KR", "Inter", sans-serif; font-weight: 900; fill: #0f172a; letter-spacing: -.03em; }
      .sub { font-family: "Noto Sans KR", "Inter", sans-serif; font-weight: 500; fill: #64748b; }
      .label { font-family: "Inter", "Noto Sans KR", sans-serif; font-weight: 900; letter-spacing: .08em; }
      .body { font-family: "Noto Sans KR", "Inter", sans-serif; font-weight: 600; fill: #475569; }
      .bookTitle { font-family: "Noto Sans KR", "Inter", sans-serif; font-weight: 900; fill: #F7D56A; letter-spacing: -.035em; }
    </style>
  </defs>

  <rect width="1800" height="1400" fill="url(#bg)"/>
  <text x="82" y="82" class="title" font-size="42">프롬프트 반영 후 현재 책자 구현 미리보기</text>
  <text x="82" y="122" class="sub" font-size="20">딥 미드나이트 네이비 가죽, 금박 타이틀, 중앙 운명수 인장, 붉은 낙관, 크림 속지 기준입니다.</text>

  <g transform="translate(70,170)">
    <rect width="1660" height="780" rx="34" fill="#ffffff" filter="url(#panelShadow)"/>
    <text x="38" y="58" class="title" font-size="30">프리미엄 책자 플로우</text>
    <text x="38" y="94" class="sub" font-size="18">표지는 프롬프트의 “premium leather-bound notebook cover” 기준으로 조정, 내부는 크림색 고급 속지로 유지.</text>

    <g transform="translate(70,135)">
      <text x="100" y="-18" class="title" font-size="22">1. 책자 표지</text>
      <rect width="380" height="585" rx="46" fill="#0b0d12"/>
      <rect x="13" y="13" width="354" height="559" rx="38" fill="#f8fafc"/>
      <rect x="27" y="30" width="326" height="500" rx="18" fill="url(#midnightLeather)" filter="url(#bookShadow)"/>
      <rect x="27" y="30" width="326" height="500" rx="18" fill="url(#leatherGrain)"/>
      <rect x="43" y="46" width="294" height="468" rx="12" fill="none" stroke="#F7D56A" stroke-opacity=".76" stroke-width="1.5"/>
      <rect x="51" y="54" width="278" height="452" rx="10" fill="none" stroke="#F7D56A" stroke-opacity=".30"/>
      <rect x="40" y="90" width="18" height="350" rx="8" fill="#000000" opacity=".22"/>
      <line x1="69" y1="72" x2="69" y2="488" stroke="#FDE68A" stroke-opacity=".72" stroke-width="2" stroke-dasharray="2 9"/>
      <rect x="286" y="30" width="16" height="96" rx="7" fill="#B91C1C"/>
      <text x="89" y="112" class="label" font-size="12" fill="#F7D56A">PREMIUM ROMANCE NOTE</text>
      <text x="89" y="210" class="bookTitle" font-size="39">수리의</text>
      <text x="89" y="262" class="bookTitle" font-size="39">운세노트</text>
      <rect x="89" y="302" width="132" height="2" fill="#F7D56A" opacity=".86"/>
      <text x="89" y="344" class="body" font-size="14" fill="#F8FAFC">연애 운세노트</text>
      <text x="89" y="374" class="body" font-size="14" fill="#CBD5E1">운명수 7 · 집중형 · 2026</text>
      <text x="89" y="402" class="body" font-size="13" fill="#94A3B8">운명수 7 · 연애 운세</text>
      <circle cx="166" cy="462" r="38" fill="#000000" opacity=".14" stroke="#F7D56A" stroke-width="3"/>
      <text x="156" y="475" class="bookTitle" font-size="32">7</text>
      <rect x="277" y="455" width="44" height="44" rx="8" fill="#B91C1C" opacity=".94"/>
      <text x="288" y="483" font-family="Noto Sans KR" font-size="15" font-weight="900" fill="#fff">수리</text>
    </g>

    <g transform="translate(640,135)">
      <text x="125" y="-18" class="title" font-size="22">2. 목차</text>
      <rect width="380" height="585" rx="46" fill="#0b0d12"/>
      <rect x="13" y="13" width="354" height="559" rx="38" fill="#f8fafc"/>
      <rect x="27" y="30" width="326" height="500" rx="18" fill="url(#midnightLeather)" filter="url(#bookShadow)"/>
      <rect x="27" y="30" width="326" height="500" rx="18" fill="url(#leatherGrain)"/>
      <rect x="43" y="46" width="294" height="468" rx="12" fill="url(#warmPage)" stroke="#E6DAC9"/>
      <rect x="43" y="46" width="294" height="468" rx="12" fill="url(#pageRules)" opacity=".65"/>
      <text x="172" y="94" class="title" font-size="25">목차</text>
      <text x="122" y="122" class="label" font-size="12" fill="#DC2626">PREMIUM ROMANCE NOTE</text>
      <g transform="translate(72,164)">
        <circle cx="23" cy="24" r="13" fill="#DC2626" opacity=".12"/><text x="19" y="29" class="label" font-size="12" fill="#DC2626">1</text>
        <text x="52" y="29" class="body" font-size="15">지혜의 본질</text><text x="210" y="29" class="body" font-size="13" fill="#DC2626" opacity=".72">p.4</text>
      </g>
      <g transform="translate(72,222)">
        <rect width="238" height="48" rx="8" fill="#FFF1F2" opacity=".62"/>
        <circle cx="23" cy="24" r="13" fill="#DC2626" opacity=".12"/><text x="19" y="29" class="label" font-size="12" fill="#DC2626">2</text>
        <text x="52" y="29" class="body" font-size="15">상황별 해석</text><text x="204" y="29" class="body" font-size="13" fill="#DC2626" opacity=".72">p.14</text>
      </g>
      <g transform="translate(72,280)">
        <circle cx="23" cy="24" r="13" fill="#DC2626" opacity=".12"/><text x="19" y="29" class="label" font-size="12" fill="#DC2626">3</text>
        <text x="52" y="29" class="body" font-size="15">주의할 장면</text><text x="204" y="29" class="body" font-size="13" fill="#DC2626" opacity=".72">p.24</text>
      </g>
      <g transform="translate(72,338)">
        <circle cx="23" cy="24" r="13" fill="#DC2626" opacity=".12"/><text x="19" y="29" class="label" font-size="12" fill="#DC2626">4</text>
        <text x="52" y="29" class="body" font-size="15">이번 달 행동 지침</text><text x="204" y="29" class="body" font-size="13" fill="#DC2626" opacity=".72">p.34</text>
      </g>
      <text x="185" y="486" class="body" font-size="13" fill="#DC2626" opacity=".48">03</text>
    </g>

    <g transform="translate(1210,135)">
      <text x="105" y="-18" class="title" font-size="22">3. 상세 해석</text>
      <rect width="380" height="585" rx="46" fill="#0b0d12"/>
      <rect x="13" y="13" width="354" height="559" rx="38" fill="#f8fafc"/>
      <rect x="27" y="30" width="326" height="500" rx="18" fill="url(#midnightLeather)" filter="url(#bookShadow)"/>
      <rect x="27" y="30" width="326" height="500" rx="18" fill="url(#leatherGrain)"/>
      <rect x="43" y="46" width="294" height="468" rx="12" fill="url(#warmPage)" stroke="#E6DAC9"/>
      <rect x="43" y="46" width="294" height="468" rx="12" fill="url(#pageRules)" opacity=".65"/>
      <circle cx="77" cy="90" r="15" fill="#DC2626"/><text x="73" y="96" class="label" font-size="12" fill="#fff">2</text>
      <text x="102" y="86" class="title" font-size="20">상황별 고민 해결 비책</text>
      <text x="102" y="111" class="label" font-size="11" fill="#DC2626">연애 특화 카운슬링</text>
      <g transform="translate(70,148)">
        <rect width="238" height="72" rx="8" fill="#ffffff" opacity=".60" stroke="#991B1B" stroke-opacity=".18"/>
        <rect width="4" height="72" rx="2" fill="#991B1B"/>
        <text x="18" y="28" class="label" font-size="12" fill="#991B1B">던지신 질문</text>
        <text x="18" y="52" class="body" font-size="12">연애 중인데 불안감을 줄이고 싶어요.</text>
      </g>
      <g transform="translate(70,244)">
        <rect width="238" height="82" rx="8" fill="#ffffff" opacity=".60" stroke="#EF4444" stroke-opacity=".18"/>
        <rect width="4" height="82" rx="2" fill="#EF4444"/>
        <text x="18" y="28" class="label" font-size="12" fill="#EF4444">주의할 장면</text>
        <text x="18" y="52" class="body" font-size="12">상대 반응보다 내 속도 조절이 먼저입니다.</text>
      </g>
      <g transform="translate(70,350)">
        <rect width="238" height="88" rx="8" fill="#ffffff" opacity=".60" stroke="#DC2626" stroke-opacity=".18"/>
        <rect width="4" height="88" rx="2" fill="#DC2626"/>
        <text x="18" y="28" class="label" font-size="12" fill="#DC2626">이번 주 실천 지침</text>
        <text x="18" y="52" class="body" font-size="12">오늘 가장 크게 남는 고민을 적기</text>
        <text x="18" y="72" class="body" font-size="12">바로 움직일 작은 선택 정하기</text>
      </g>
      <text x="185" y="486" class="body" font-size="13" fill="#DC2626" opacity=".48">15</text>
    </g>
  </g>

  <g transform="translate(70,1010)">
    <rect width="1660" height="300" rx="34" fill="#ffffff" filter="url(#panelShadow)"/>
    <text x="38" y="58" class="title" font-size="30">보관함/리더 표지 컴포넌트</text>
    <text x="38" y="92" class="sub" font-size="18">연애/궁합은 딥 미드나이트 네이비 + 붉은 리본, 나머지는 기존 카테고리 커버색을 유지합니다.</text>
    <g transform="translate(70,120)">
      <g>
        <rect width="150" height="150" rx="8" fill="url(#midnightLeather)" filter="url(#bookShadow)"/><rect width="150" height="150" rx="8" fill="url(#leatherGrain)"/>
        <rect x="10" y="10" width="130" height="130" rx="6" fill="none" stroke="#F7D56A"/><rect x="114" y="0" width="12" height="42" rx="5" fill="#B91C1C"/>
        <text x="32" y="58" class="bookTitle" font-size="22">수리의</text><text x="32" y="88" class="bookTitle" font-size="22">운세노트</text><circle cx="75" cy="122" r="20" fill="#000" opacity=".15" stroke="#F7D56A" stroke-width="2"/><text x="69" y="130" class="bookTitle" font-size="19">7</text>
        <text x="51" y="188" class="title" font-size="16">연애</text>
      </g>
      <g transform="translate(270,0)">
        <rect width="150" height="150" rx="8" fill="url(#midnightLeather)" filter="url(#bookShadow)"/><rect width="150" height="150" rx="8" fill="url(#leatherGrain)"/>
        <rect x="10" y="10" width="130" height="130" rx="6" fill="none" stroke="#F7D56A"/><rect x="114" y="0" width="12" height="42" rx="5" fill="#2563EB"/>
        <text x="32" y="58" class="bookTitle" font-size="22">수리의</text><text x="32" y="88" class="bookTitle" font-size="22">운세노트</text><circle cx="75" cy="122" r="20" fill="#000" opacity=".15" stroke="#F7D56A" stroke-width="2"/><text x="69" y="130" class="bookTitle" font-size="19">7</text>
        <text x="41" y="188" class="title" font-size="16">일 &amp; 진로</text>
      </g>
      <g transform="translate(540,0)">
        <rect width="150" height="150" rx="8" fill="url(#moneyLeather)" filter="url(#bookShadow)"/><rect width="150" height="150" rx="8" fill="url(#leatherGrain)"/>
        <rect x="10" y="10" width="130" height="130" rx="6" fill="none" stroke="#F7D56A"/><rect x="114" y="0" width="12" height="42" rx="5" fill="#10B981"/>
        <text x="32" y="58" class="bookTitle" font-size="22">수리의</text><text x="32" y="88" class="bookTitle" font-size="22">운세노트</text><circle cx="75" cy="122" r="20" fill="#000" opacity=".15" stroke="#F7D56A" stroke-width="2"/><text x="69" y="130" class="bookTitle" font-size="19">7</text>
        <text x="58" y="188" class="title" font-size="16">돈</text>
      </g>
    </g>
  </g>
</svg>
