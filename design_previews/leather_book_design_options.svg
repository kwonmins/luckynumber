<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1480" viewBox="0 0 1600 1480">
  <defs>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="22" flood-color="#0f172a" flood-opacity="0.16"/>
    </filter>
    <filter id="bookShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="15" flood-color="#08090c" flood-opacity="0.30"/>
    </filter>
    <filter id="deboss">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-color="#ffffff" flood-opacity="0.08"/>
      <feDropShadow dx="0" dy="-1" stdDeviation="1" flood-color="#000000" flood-opacity="0.32"/>
    </filter>
    <pattern id="leatherGrainDark" width="32" height="32" patternUnits="userSpaceOnUse">
      <rect width="32" height="32" fill="#12151c"/>
      <path d="M0 8 C8 4 14 14 22 8 S32 6 36 12" stroke="#ffffff" stroke-opacity=".035" fill="none"/>
      <path d="M-4 24 C8 18 18 30 32 22" stroke="#000000" stroke-opacity=".22" fill="none"/>
      <circle cx="8" cy="18" r="1.2" fill="#ffffff" opacity=".035"/>
      <circle cx="25" cy="7" r="1" fill="#000000" opacity=".18"/>
    </pattern>
    <pattern id="leatherGrainCognac" width="34" height="34" patternUnits="userSpaceOnUse">
      <rect width="34" height="34" fill="#8a4f2a"/>
      <path d="M0 9 C7 4 15 14 23 8 S34 6 38 12" stroke="#fff3d6" stroke-opacity=".065" fill="none"/>
      <path d="M-5 27 C8 18 18 30 34 22" stroke="#3d1d10" stroke-opacity=".22" fill="none"/>
      <circle cx="9" cy="19" r="1.1" fill="#fff3d6" opacity=".055"/>
      <circle cx="27" cy="8" r="1" fill="#3d1d10" opacity=".16"/>
    </pattern>
    <pattern id="leatherGrainWine" width="32" height="32" patternUnits="userSpaceOnUse">
      <rect width="32" height="32" fill="#61142a"/>
      <path d="M0 10 C8 5 14 15 22 9 S32 6 36 13" stroke="#ffe4ef" stroke-opacity=".06" fill="none"/>
      <path d="M-4 25 C8 18 18 30 32 23" stroke="#230712" stroke-opacity=".28" fill="none"/>
      <circle cx="9" cy="18" r="1.2" fill="#ffe4ef" opacity=".05"/>
    </pattern>
    <pattern id="saffianoGreen" width="18" height="18" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="18" height="18" fill="#123d36"/>
      <line x1="0" y1="4" x2="18" y2="4" stroke="#ffffff" stroke-opacity=".045"/>
      <line x1="0" y1="12" x2="18" y2="12" stroke="#000000" stroke-opacity=".18"/>
    </pattern>
    <linearGradient id="goldFoil" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff4ba"/>
      <stop offset=".32" stop-color="#d4a83d"/>
      <stop offset=".62" stop-color="#fff1a6"/>
      <stop offset="1" stop-color="#b8831e"/>
    </linearGradient>
    <linearGradient id="roseFoil" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffe6eb"/>
      <stop offset=".38" stop-color="#d98a9d"/>
      <stop offset=".72" stop-color="#fff0f3"/>
      <stop offset="1" stop-color="#a94f65"/>
    </linearGradient>
    <style>
      .title { font-family: "Noto Sans KR", "Inter", sans-serif; font-weight: 900; fill: #0f172a; }
      .sub { font-family: "Noto Sans KR", "Inter", sans-serif; font-weight: 500; fill: #64748b; }
      .label { font-family: "Inter", "Noto Sans KR", sans-serif; font-weight: 900; letter-spacing: .09em; }
      .bookTitle { font-family: "Noto Sans KR", "Inter", sans-serif; font-weight: 900; letter-spacing: -.02em; }
      .body { font-family: "Noto Sans KR", "Inter", sans-serif; font-weight: 600; fill: #475569; }
      .small { font-size: 15px; }
      .tiny { font-size: 12px; }
      .stitch { fill: none; stroke-linecap: round; stroke-dasharray: 2 9; stroke-width: 2; opacity: .62; }
    </style>
  </defs>

  <rect width="1600" height="1480" fill="#f8fafc"/>
  <text x="80" y="92" class="title" font-size="42">수리의 운세노트 가죽 커버 시안</text>
  <text x="80" y="132" class="sub" font-size="20">Compose/SVG로 구현 가능한 질감 기준. 가죽 그레인, 스티치, 금박, 음각 타이틀을 조합한 앱용 프리미엄 책자 방향입니다.</text>

  <!-- A -->
  <g transform="translate(70,180)">
    <rect width="705" height="560" rx="28" fill="#ffffff" filter="url(#softShadow)"/>
    <text x="34" y="52" class="title" font-size="25">A. Midnight Leather</text>
    <text x="34" y="82" class="sub" font-size="16">블랙 네이비 가죽 · 금박 · 가장 프리미엄하고 차분한 기본안</text>

    <rect x="52" y="118" width="285" height="400" rx="18" fill="url(#leatherGrainDark)" filter="url(#bookShadow)"/>
    <rect x="70" y="138" width="249" height="360" rx="14" fill="none" stroke="url(#goldFoil)" stroke-width="2"/>
    <rect x="80" y="148" width="229" height="340" rx="10" fill="none" stroke="#f6d36c" stroke-opacity=".28"/>
    <path d="M76 138 V498" stroke="#0a0d13" stroke-width="20" stroke-opacity=".42"/>
    <path d="M88 158 V478" stroke="#f2c95b" class="stitch"/>
    <rect x="276" y="118" width="16" height="86" rx="7" fill="#2563eb"/>
    <rect x="278" y="118" width="4" height="86" rx="2" fill="#93c5fd" opacity=".55"/>
    <text x="116" y="194" class="label" font-size="12" fill="url(#goldFoil)">PREMIUM NOTE</text>
    <text x="116" y="266" class="bookTitle" font-size="34" fill="#f8fafc" filter="url(#deboss)">수리의</text>
    <text x="116" y="310" class="bookTitle" font-size="34" fill="#f8fafc" filter="url(#deboss)">운세노트</text>
    <line x1="116" y1="346" x2="274" y2="346" stroke="url(#goldFoil)" stroke-width="2" opacity=".72"/>
    <text x="116" y="394" class="body small" fill="#cbd5e1">연애 · 운명수 7</text>
    <circle cx="194" cy="447" r="38" fill="#111827" stroke="url(#goldFoil)" stroke-width="3"/>
    <text x="184" y="459" class="bookTitle" font-size="31" fill="url(#goldFoil)">7</text>

    <rect x="382" y="136" width="260" height="132" rx="16" fill="#111827"/>
    <rect x="398" y="154" width="228" height="96" rx="12" fill="#f8fafc"/>
    <text x="486" y="186" class="title" font-size="20">목차</text>
    <circle cx="424" cy="218" r="12" fill="#eff6ff"/><text x="421" y="223" class="label" font-size="11" fill="#2563eb">1</text>
    <text x="448" y="224" class="body tiny">지혜의 본질</text><text x="600" y="224" class="body tiny" fill="#2563eb">p.4</text>
    <rect x="382" y="300" width="260" height="150" rx="16" fill="#111827"/>
    <rect x="398" y="316" width="228" height="118" rx="12" fill="#f8fafc"/>
    <rect x="398" y="316" width="5" height="118" rx="2" fill="#2563eb"/>
    <text x="418" y="348" class="title" font-size="18">상황별 해석</text>
    <text x="418" y="380" class="label" font-size="11" fill="#2563eb">SURI COUNSEL</text>
  </g>

  <!-- B -->
  <g transform="translate(825,180)">
    <rect width="705" height="560" rx="28" fill="#ffffff" filter="url(#softShadow)"/>
    <text x="34" y="52" class="title" font-size="25">B. Cognac Classic</text>
    <text x="34" y="82" class="sub" font-size="16">코냑 브라운 가죽 · 클래식 스티치 · 따뜻한 유료 책자 느낌</text>

    <rect x="52" y="118" width="285" height="400" rx="18" fill="url(#leatherGrainCognac)" filter="url(#bookShadow)"/>
    <rect x="70" y="138" width="249" height="360" rx="14" fill="none" stroke="#f3d28b" stroke-width="2"/>
    <rect x="82" y="150" width="225" height="336" rx="10" fill="none" stroke="#3d1d10" stroke-opacity=".28"/>
    <path d="M88 158 V478" stroke="#f8e3b0" class="stitch"/>
    <path d="M300 158 V478" stroke="#f8e3b0" class="stitch"/>
    <rect x="270" y="118" width="16" height="88" rx="7" fill="#f59e0b"/>
    <text x="110" y="196" class="label" font-size="12" fill="#fff4ba">CLASSIC EDITION</text>
    <text x="110" y="270" class="bookTitle" font-size="34" fill="#fffaf0">연애</text>
    <text x="110" y="314" class="bookTitle" font-size="34" fill="#fffaf0">운세노트</text>
    <rect x="110" y="346" width="156" height="2" fill="#f3d28b"/>
    <text x="110" y="394" class="body small" fill="#fff0c9">마음의 속도와 거리감</text>
    <circle cx="194" cy="447" r="38" fill="#6f3d20" stroke="#f3d28b" stroke-width="3"/>
    <text x="184" y="459" class="bookTitle" font-size="31" fill="#fff4ba">7</text>

    <rect x="382" y="136" width="260" height="132" rx="16" fill="#fffaf0" stroke="#ead0a6"/>
    <text x="486" y="176" class="title" font-size="20">목차</text>
    <rect x="408" y="204" width="208" height="1" fill="#ead0a6"/>
    <text x="414" y="232" class="body tiny">01 지혜의 본질</text><text x="590" y="232" class="body tiny" fill="#8a4f2a">p.4</text>
    <rect x="382" y="300" width="260" height="150" rx="16" fill="#fffaf0" stroke="#ead0a6"/>
    <text x="410" y="344" class="title" font-size="18">상황별 고민 해결 비책</text>
    <rect x="410" y="370" width="204" height="46" rx="8" fill="#fff" stroke="#8a4f2a" stroke-opacity=".18"/>
    <rect x="410" y="370" width="5" height="46" rx="2" fill="#8a4f2a"/>
    <text x="428" y="399" class="label" font-size="11" fill="#6f3d20">던지신 질문</text>
  </g>

  <!-- C -->
  <g transform="translate(70,800)">
    <rect width="705" height="560" rx="28" fill="#ffffff" filter="url(#softShadow)"/>
    <text x="34" y="52" class="title" font-size="25">C. Wine Leather Romance</text>
    <text x="34" y="82" class="sub" font-size="16">버건디 가죽 · 로즈골드 금박 · 연애/궁합에 가장 잘 맞는 감성안</text>

    <rect x="52" y="118" width="285" height="400" rx="18" fill="url(#leatherGrainWine)" filter="url(#bookShadow)"/>
    <rect x="70" y="138" width="249" height="360" rx="14" fill="none" stroke="url(#roseFoil)" stroke-width="2"/>
    <rect x="82" y="150" width="225" height="336" rx="10" fill="none" stroke="#f8c4d1" stroke-opacity=".25"/>
    <path d="M80 142 C128 180 250 132 308 184" stroke="#ffffff" stroke-opacity=".055" stroke-width="22" fill="none"/>
    <path d="M88 158 V478" stroke="#ffd5df" class="stitch"/>
    <rect x="276" y="118" width="16" height="86" rx="7" fill="#f472b6"/>
    <text x="108" y="196" class="label" font-size="12" fill="url(#roseFoil)">ROMANCE PRIVATE</text>
    <text x="108" y="270" class="bookTitle" font-size="34" fill="#fff5f7">연애</text>
    <text x="108" y="314" class="bookTitle" font-size="34" fill="#fff5f7">운세노트</text>
    <text x="108" y="376" class="body small" fill="#ffd6df">불안보다 나의 중심</text>
    <circle cx="194" cy="447" r="38" fill="#4a0e20" stroke="url(#roseFoil)" stroke-width="3"/>
    <text x="184" y="459" class="bookTitle" font-size="31" fill="#ffe6eb">7</text>

    <rect x="382" y="136" width="260" height="132" rx="16" fill="#fff7f9" stroke="#f2d4dc"/>
    <text x="486" y="176" class="title" font-size="20">목차</text>
    <circle cx="418" cy="218" r="12" fill="#ffe4ec"/><text x="415" y="223" class="label" font-size="11" fill="#be123c">1</text>
    <text x="442" y="224" class="body tiny">지혜의 본질</text><text x="594" y="224" class="body tiny" fill="#be123c">p.4</text>
    <rect x="382" y="300" width="260" height="150" rx="16" fill="#fff7f9" stroke="#f2d4dc"/>
    <text x="410" y="344" class="title" font-size="18">상황별 고민 해결 비책</text>
    <rect x="410" y="370" width="204" height="46" rx="8" fill="#fff" stroke="#be123c" stroke-opacity=".18"/>
    <rect x="410" y="370" width="5" height="46" rx="2" fill="#be123c"/>
    <text x="428" y="399" class="label" font-size="11" fill="#be123c">주의할 장면</text>
  </g>

  <!-- D -->
  <g transform="translate(825,800)">
    <rect width="705" height="560" rx="28" fill="#ffffff" filter="url(#softShadow)"/>
    <text x="34" y="52" class="title" font-size="25">D. Forest Saffiano</text>
    <text x="34" y="82" class="sub" font-size="16">딥 그린 사피아노 · 미니멀 금박 · 돈/자기 기준 노트에 좋은 현대안</text>

    <rect x="52" y="118" width="285" height="400" rx="18" fill="url(#saffianoGreen)" filter="url(#bookShadow)"/>
    <rect x="70" y="138" width="249" height="360" rx="14" fill="none" stroke="url(#goldFoil)" stroke-width="2"/>
    <rect x="82" y="150" width="225" height="336" rx="10" fill="none" stroke="#ffffff" stroke-opacity=".14"/>
    <rect x="276" y="118" width="16" height="86" rx="7" fill="#10b981"/>
    <text x="108" y="196" class="label" font-size="12" fill="url(#goldFoil)">MONEY EDITION</text>
    <text x="108" y="270" class="bookTitle" font-size="34" fill="#f8fafc">돈의 흐름</text>
    <text x="108" y="314" class="bookTitle" font-size="34" fill="#f8fafc">노트</text>
    <line x1="108" y1="348" x2="268" y2="348" stroke="#f3d28b" stroke-width="2"/>
    <text x="108" y="394" class="body small" fill="#d1fae5">작게 새는 흐름을 정리</text>
    <circle cx="194" cy="447" r="38" fill="#0f2f2a" stroke="url(#goldFoil)" stroke-width="3"/>
    <text x="184" y="459" class="bookTitle" font-size="31" fill="#fff4ba">7</text>

    <rect x="382" y="136" width="260" height="132" rx="16" fill="#f7fbf8" stroke="#d6eae4"/>
    <text x="486" y="176" class="title" font-size="20">목차</text>
    <rect x="410" y="204" width="205" height="34" rx="17" fill="#ecfdf5"/>
    <text x="424" y="226" class="body tiny">01 지혜의 본질</text><text x="590" y="226" class="body tiny" fill="#0f766e">p.4</text>
    <rect x="382" y="300" width="260" height="150" rx="16" fill="#f7fbf8" stroke="#d6eae4"/>
    <text x="410" y="344" class="title" font-size="18">상황별 고민 해결 비책</text>
    <rect x="410" y="370" width="204" height="46" rx="8" fill="#fff" stroke="#0f766e" stroke-opacity=".18"/>
    <rect x="410" y="370" width="5" height="46" rx="2" fill="#0f766e"/>
    <text x="428" y="399" class="label" font-size="11" fill="#0f766e">돈의 흐름 포인트</text>
  </g>
</svg>
